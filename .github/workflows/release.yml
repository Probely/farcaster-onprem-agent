name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  verify-tag:
    name: Verify Tag
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag is on main branch
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "::error::Tag must point to a commit on the main branch"
            exit 1
          fi

  build:
    name: Build ${{ matrix.os }}/${{ matrix.arch }}
    needs: verify-tag
    if: always() && (needs.verify-tag.result == 'success' || needs.verify-tag.result == 'skipped')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: linux
            arch: amd64
            ext: ""
          - os: linux
            arch: arm64
            ext: ""
          - os: darwin
            arch: amd64
            ext: ""
          - os: darwin
            arch: arm64
            ext: ""
          - os: windows
            arch: amd64
            ext: ".exe"
          - os: windows
            arch: arm64
            ext: ".exe"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: farcaster-go/go.sum

      - name: Build binary
        working-directory: farcaster-go
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: "0"
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          COMMIT="${GITHUB_SHA::7}"
          BINARY="farcasterd-${{ matrix.os }}-${{ matrix.arch }}-${VERSION}${{ matrix.ext }}"
          go build \
            -ldflags "-X probely.com/farcaster/settings.Version=${VERSION} -X probely.com/farcaster/settings.Commit=${COMMIT}" \
            -o "bin/${BINARY}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: farcasterd-${{ matrix.os }}-${{ matrix.arch }}
          path: farcaster-go/bin/farcasterd-*
          retention-days: 1

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        working-directory: artifacts
        run: sha256sum farcasterd-* > checksums-sha256.txt

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: artifacts/farcasterd-*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
