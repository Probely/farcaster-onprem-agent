services:
  farcaster:
    image: probely/farcaster-onprem-agent:v3
    depends_on:
      tcpdump:
        condition: service_healthy
    network_mode: service:tcpdump
    environment:
      - HTTP_PROXY
      - HTTPS_PROXY
      - RUN_MODE
      - FARCASTER_DEBUG_LEVEL
      - FARCASTER_AGENT_TOKEN
      - FARCASTER_API_URL
    cap_add:
    - NET_ADMIN
    volumes:
    - shared-logs:/logs
    restart: "no"
    stop_grace_period: 1s

  tcpdump:
    image: alpine
    healthcheck:
      test: ["CMD", "pidof", "tcpdump"]
      interval: 10s
      timeout: 1s
      retries: 3
    command:
    - /bin/ash
    - -c
    - apk add --no-cache tcpdump > /dev/null 2>&1
      && tcpdump -s0 -n -i eth0
    restart: always
    stop_grace_period: 1s

volumes:
  shared-logs:
